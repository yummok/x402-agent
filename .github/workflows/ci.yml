name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Check formatting
        run: deno fmt --check
      - name: Lint
        run: deno lint
      - name: Type check
        run: deno check x402SellPremiumJoke.ts x402PayAndFetch.ts

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for secrets
        run: |
          if grep -rE "0x[a-fA-F0-9]{64}" --include="*.ts" --include="*.js" --include="*.json" .; then
            echo "❌ Private key detected in source files!"
            exit 1
          fi
          if grep -rE "ghp_[a-zA-Z0-9]{36}" --include="*.ts" --include="*.js" --include="*.json" .; then
            echo "❌ GitHub token detected in source files!"
            exit 1
          fi
          echo "✅ No secrets found in source files"
